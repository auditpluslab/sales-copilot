name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx for test data setup
        run: npm install --save-dev tsx

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup E2E authentication
        run: |
          mkdir -p e2e/.auth
          echo '{"mock": true}' > e2e/.auth/user.json

      - name: Setup test data
        run: npm run test:setup-data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start development server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 120000
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run E2E tests
        run: npm run test:e2e -- --retries=1
        env:
          CI: true
          NODE_ENV: development

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 30

  comprehensive-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx for test data setup
        run: npm install --save-dev tsx

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup E2E authentication
        run: |
          mkdir -p e2e/.auth
          echo '{"mock": true}' > e2e/.auth/user.json

      - name: Setup test data
        run: npm run test:setup-data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start development server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 120000
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run comprehensive meeting tests
        run: npx playwright test e2e/comprehensive-meeting.spec.ts --retries=2
        env:
          CI: true
          NODE_ENV: development
          NEXT_PUBLIC_USE_LLM_IN_DEV: 'false'

      - name: Upload comprehensive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-test-report
          path: playwright-report/
          retention-days: 30

      - name: Upload comprehensive test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-test-screenshots
          path: test-results/
          retention-days: 30
